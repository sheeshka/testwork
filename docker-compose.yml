services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ./backend/.env
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./backend:/app
    depends_on:
      - postgres

volumes:
  pgdata:
